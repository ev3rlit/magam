<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component: Washi Tape</title>
<style>
  /*
   * WASHI TAPE COMPONENT
   * --------------------
   * Semi-transparent decorative tape strips with pattern overlays.
   * Used to "attach" paper notes, photos, and other elements.
   *
   * Usage:
   *   <div class="washi washi-pink washi-edge-left" style="width:140px; transform:rotate(-2deg);"></div>
   *
   * Variants: washi-pink, washi-mint, washi-butter, washi-lavender, washi-sky, washi-peach
   * Edges:    washi-edge-left, washi-edge-right (torn/cut edge clip-paths)
   *
   * CSS Custom Properties:
   *   --washi-height: 28px (default tape height)
   *   --washi-opacity: 0.85
   */

  :root {
    --cream: #faf5eb;
    --pink-soft: #f7c5cc;
    --mint: #b8e6d0;
    --butter: #fce588;
    --lavender: #d4c5f0;
    --sky: #b3d9f2;
    --peach: #fbd0b0;
    --washi-height: 28px;
    --washi-opacity: 0.85;
  }

  body {
    background: var(--cream);
    padding: 40px;
    font-family: system-ui, sans-serif;
  }

  .demo-label {
    font-size: 13px;
    color: #888;
    margin-bottom: 6px;
    font-family: monospace;
  }
  .demo-row {
    margin-bottom: 30px;
    position: relative;
    min-height: 50px;
  }

  /* ===== BASE WASHI TAPE ===== */
  .washi {
    position: absolute;
    height: var(--washi-height);
    border-radius: 1px;
    opacity: var(--washi-opacity);
    z-index: 20;
    mix-blend-mode: multiply;
  }

  /* Semi-transparent fiber texture overlay */
  .washi::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 3px,
      rgba(255,255,255,0.15) 3px, rgba(255,255,255,0.15) 4px
    );
  }

  /* ===== COLOR VARIANTS (each with unique pattern) ===== */

  /* Pink: diagonal stripes */
  .washi-pink {
    background-color: var(--pink-soft);
    background-image: repeating-linear-gradient(
      45deg,
      transparent, transparent 5px,
      rgba(255,255,255,0.2) 5px, rgba(255,255,255,0.2) 10px
    );
  }

  /* Mint: reverse diagonal stripes */
  .washi-mint {
    background-color: var(--mint);
    background-image: repeating-linear-gradient(
      -45deg,
      transparent, transparent 4px,
      rgba(255,255,255,0.25) 4px, rgba(255,255,255,0.25) 8px
    );
  }

  /* Butter: horizontal lines */
  .washi-butter {
    background-color: var(--butter);
    background-image: repeating-linear-gradient(
      0deg,
      transparent, transparent 6px,
      rgba(255,200,50,0.3) 6px, rgba(255,200,50,0.3) 7px
    );
  }

  /* Lavender: steep diagonal */
  .washi-lavender {
    background-color: var(--lavender);
    background-image: repeating-linear-gradient(
      60deg,
      transparent, transparent 3px,
      rgba(255,255,255,0.2) 3px, rgba(255,255,255,0.2) 6px
    );
  }

  /* Sky: polka dots */
  .washi-sky {
    background-color: var(--sky);
    background-image: radial-gradient(
      circle 2px,
      rgba(255,255,255,0.3) 1px,
      transparent 1px
    );
    background-size: 8px 8px;
  }

  /* Peach: vertical bars */
  .washi-peach {
    background-color: var(--peach);
    background-image: repeating-linear-gradient(
      90deg,
      transparent, transparent 8px,
      rgba(240,160,112,0.3) 8px, rgba(240,160,112,0.3) 10px
    );
  }

  /* ===== TORN EDGE VARIANTS ===== */
  .washi-edge-left {
    clip-path: polygon(2% 0%, 100% 0%, 98% 100%, 0% 100%);
  }
  .washi-edge-right {
    clip-path: polygon(0% 0%, 98% 0%, 100% 100%, 2% 100%);
  }

  /* ===== USAGE EXAMPLE: attaching to a box ===== */
  .example-box {
    width: 200px;
    height: 120px;
    background: #fff;
    box-shadow: 2px 3px 8px rgba(90,62,40,0.12);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: #999;
    position: relative;
    margin: 30px auto;
  }
</style>
</head>
<body>

<h2>🎀 Washi Tape Component</h2>

<!-- All 6 color variants -->
<div class="demo-row">
  <div class="demo-label">.washi.washi-pink</div>
  <div class="washi washi-pink" style="width:200px; position:relative;"></div>
</div>

<div class="demo-row">
  <div class="demo-label">.washi.washi-mint.washi-edge-left</div>
  <div class="washi washi-mint washi-edge-left" style="width:180px; position:relative; transform:rotate(-1deg);"></div>
</div>

<div class="demo-row">
  <div class="demo-label">.washi.washi-butter</div>
  <div class="washi washi-butter" style="width:160px; position:relative; transform:rotate(2deg);"></div>
</div>

<div class="demo-row">
  <div class="demo-label">.washi.washi-lavender.washi-edge-right</div>
  <div class="washi washi-lavender washi-edge-right" style="width:190px; position:relative; transform:rotate(-0.5deg);"></div>
</div>

<div class="demo-row">
  <div class="demo-label">.washi.washi-sky</div>
  <div class="washi washi-sky" style="width:170px; position:relative; transform:rotate(1.5deg);"></div>
</div>

<div class="demo-row">
  <div class="demo-label">.washi.washi-peach</div>
  <div class="washi washi-peach" style="width:150px; position:relative; transform:rotate(-2deg);"></div>
</div>

<!-- Attached example -->
<h3>Attached to a note</h3>
<div class="example-box">
  <div class="washi washi-pink washi-edge-left" style="width:100px; top:-14px; left:20px; transform:rotate(-3deg);"></div>
  <div class="washi washi-mint washi-edge-right" style="width:80px; top:-12px; right:10px; transform:rotate(2deg);"></div>
  paper note
</div>

</body>
</html>
