<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component: Rubber Stamp</title>
<style>
  /*
   * RUBBER STAMP COMPONENT
   * ----------------------
   * Vintage rubber stamp effect with border, rotation, and faded ink.
   * Used for decorative approval marks, dates, and labels.
   *
   * Usage:
   *   <div class="stamp stamp-red">★ Approved ★</div>
   *
   * Color variants: stamp-red, stamp-blue, stamp-green, stamp-purple, stamp-brown
   *
   * Modifiers:
   *   .stamp-round   — circular stamp
   *   .stamp-double  — double border
   *   .stamp-faded   — extra faded ink
   *
   * Animation:
   *   .stamp-animate — slam-down entrance
   */

  :root { --cream: #faf5eb; }
  body { background: var(--cream); padding: 40px; font-family: system-ui, sans-serif; }
  .demo-label { font-size: 13px; color: #888; margin-bottom: 10px; font-family: monospace; }
  .demo-grid { display: flex; flex-wrap: wrap; gap: 30px; margin-bottom: 30px; }

  /* ===== BASE STAMP ===== */
  .stamp {
    display: inline-block;
    border: 3px solid;
    border-radius: 4px;
    padding: 6px 14px;
    font-family: 'Patrick Hand', cursive;
    font-size: 16px;
    text-transform: uppercase;
    letter-spacing: 2px;
    opacity: 0.7;
    transform: rotate(-8deg);
    position: relative;
  }

  /* Ink bleed texture */
  .stamp::before {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 64 64' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.6' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.08'/%3E%3C/svg%3E");
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  /* ===== COLOR VARIANTS ===== */
  .stamp-red    { border-color: #cc4444; color: #cc4444; }
  .stamp-blue   { border-color: #3366aa; color: #3366aa; }
  .stamp-green  { border-color: #338855; color: #338855; }
  .stamp-purple { border-color: #7744aa; color: #7744aa; }
  .stamp-brown  { border-color: #8b6914; color: #8b6914; }

  /* ===== ROUND STAMP ===== */
  .stamp-round {
    border-radius: 50%;
    width: 90px; height: 90px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 10px;
    font-size: 12px;
    line-height: 1.3;
  }

  /* ===== DOUBLE BORDER ===== */
  .stamp-double {
    outline: 2px solid;
    outline-offset: 3px;
  }
  .stamp-double.stamp-red    { outline-color: #cc4444; }
  .stamp-double.stamp-blue   { outline-color: #3366aa; }
  .stamp-double.stamp-green  { outline-color: #338855; }

  /* ===== EXTRA FADED ===== */
  .stamp-faded { opacity: 0.45; }

  /* ===== SLAM ANIMATION ===== */
  @keyframes stamp-slam {
    0%   { opacity: 0; transform: scale(2.5) rotate(-15deg); }
    50%  { opacity: 0.8; transform: scale(0.9) rotate(-8deg); }
    70%  { transform: scale(1.05) rotate(-8deg); }
    100% { opacity: 0.7; transform: scale(1) rotate(-8deg); }
  }
  .stamp-animate {
    animation: stamp-slam 0.6s ease-out both;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
</head>
<body>

<h2>🔏 Rubber Stamp Component</h2>

<div class="demo-label">Color variants</div>
<div class="demo-grid">
  <div class="stamp stamp-red" style="transform:rotate(-8deg);">★ Approved ★</div>
  <div class="stamp stamp-blue" style="transform:rotate(-5deg);">Confidential</div>
  <div class="stamp stamp-green" style="transform:rotate(-10deg);">✓ Complete</div>
  <div class="stamp stamp-purple" style="transform:rotate(-6deg);">Draft</div>
  <div class="stamp stamp-brown" style="transform:rotate(-12deg);">Vintage</div>
</div>

<div class="demo-label">Round + Double border</div>
<div class="demo-grid">
  <div class="stamp stamp-red stamp-round" style="transform:rotate(-8deg);">First Class</div>
  <div class="stamp stamp-blue stamp-round stamp-double" style="transform:rotate(5deg);">TOP SECRET</div>
  <div class="stamp stamp-green stamp-double" style="transform:rotate(-6deg);">✓ Verified ✓</div>
</div>

<div class="demo-label">Faded ink</div>
<div class="demo-grid">
  <div class="stamp stamp-red stamp-faded" style="transform:rotate(-8deg);">Archived 2024</div>
  <div class="stamp stamp-brown stamp-faded stamp-double" style="transform:rotate(-12deg);">Antique</div>
</div>

<div class="demo-label">Animated entrance (reload to replay)</div>
<div class="demo-grid">
  <div class="stamp stamp-red stamp-animate">★ Approved ★</div>
</div>

</body>
</html>
