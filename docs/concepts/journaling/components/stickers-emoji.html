<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component: SVG Stickers & Emoji</title>
<style>
  /*
   * SVG STICKERS & EMOJI COMPONENT
   * ------------------------------
   * Reusable SVG symbol stickers: flowers, hearts, stars, leaves, clouds.
   * Plus emoji sticker hover/click interactions.
   *
   * Usage (SVG sticker):
   *   <svg class="sticker" width="50" height="50" viewBox="0 0 60 60">
   *     <use href="#flower-1"/>
   *   </svg>
   *
   * Usage (Emoji):
   *   <span class="emoji-sticker" style="font-size:36px;">🌸</span>
   *
   * Available symbols: #flower-1, #flower-2, #star, #heart, #cloud, #leaf
   *
   * Interactions:
   *   - Hover: scale up
   *   - Click: emoji particle burst (requires JS)
   */

  :root { --cream: #faf5eb; }
  body { background: var(--cream); padding: 40px; font-family: system-ui, sans-serif; }
  .demo-label { font-size: 13px; color: #888; margin-bottom: 10px; font-family: monospace; }
  .demo-row { display: flex; gap: 20px; align-items: center; margin-bottom: 30px; flex-wrap: wrap; }

  /* ===== SVG STICKER ===== */
  .sticker {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 15;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    filter: drop-shadow(1px 2px 2px rgba(90,62,40,0.2));
    cursor: pointer;
  }
  .sticker:hover {
    transform: scale(1.25) rotate(0deg) !important;
    z-index: 50;
  }

  /* ===== EMOJI STICKER ===== */
  .emoji-sticker {
    font-size: 40px;
    filter: drop-shadow(1px 2px 3px rgba(0,0,0,0.15));
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    user-select: none;
    display: inline-block;
  }
  .emoji-sticker:hover {
    transform: scale(1.3) !important;
  }

  /* ===== ANIMATIONS ===== */
  @keyframes pop-in {
    0% { opacity: 0; transform: scale(0.3); }
    60% { transform: scale(1.1); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes float-gentle {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-6px); }
  }
  .anim-pop { animation: pop-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both; }
  .anim-float { animation: float-gentle 4s ease-in-out infinite; }
</style>
</head>
<body>

<!-- ===== SVG SYMBOL DEFINITIONS ===== -->
<svg width="0" height="0" style="position:absolute;">
  <defs>
    <!-- Flower 1: 5-petal round -->
    <symbol id="flower-1" viewBox="0 0 60 60">
      <circle cx="30" cy="18" r="10" fill="#f7c5cc"/>
      <circle cx="42" cy="30" r="10" fill="#f7c5cc"/>
      <circle cx="36" cy="44" r="10" fill="#f7c5cc"/>
      <circle cx="24" cy="44" r="10" fill="#f7c5cc"/>
      <circle cx="18" cy="30" r="10" fill="#f7c5cc"/>
      <circle cx="30" cy="30" r="8" fill="#fce588"/>
    </symbol>

    <!-- Flower 2: 5-petal elongated (lavender) -->
    <symbol id="flower-2" viewBox="0 0 50 50">
      <ellipse cx="25" cy="12" rx="7" ry="10" fill="#d4c5f0" transform="rotate(0 25 25)"/>
      <ellipse cx="25" cy="12" rx="7" ry="10" fill="#d4c5f0" transform="rotate(72 25 25)"/>
      <ellipse cx="25" cy="12" rx="7" ry="10" fill="#d4c5f0" transform="rotate(144 25 25)"/>
      <ellipse cx="25" cy="12" rx="7" ry="10" fill="#d4c5f0" transform="rotate(216 25 25)"/>
      <ellipse cx="25" cy="12" rx="7" ry="10" fill="#d4c5f0" transform="rotate(288 25 25)"/>
      <circle cx="25" cy="25" r="6" fill="#fce588"/>
    </symbol>

    <!-- Star -->
    <symbol id="star" viewBox="0 0 40 40">
      <path d="M20 2 L24.5 14.5 L38 15 L27.5 24 L30.5 37 L20 30 L9.5 37 L12.5 24 L2 15 L15.5 14.5 Z"
            fill="#fce588" stroke="#f0c93a" stroke-width="1"/>
    </symbol>

    <!-- Heart -->
    <symbol id="heart" viewBox="0 0 40 40">
      <path d="M20 35 C15 30, 2 22, 2 13 C2 7, 7 2, 13 2 C16.5 2, 19 4, 20 7
               C21 4, 23.5 2, 27 2 C33 2, 38 7, 38 13 C38 22, 25 30, 20 35Z"
            fill="#f7c5cc" stroke="#e8668a" stroke-width="0.5"/>
    </symbol>

    <!-- Cloud -->
    <symbol id="cloud" viewBox="0 0 80 50">
      <ellipse cx="28" cy="32" rx="20" ry="14" fill="#e8f4fc"/>
      <ellipse cx="50" cy="28" rx="22" ry="16" fill="#e8f4fc"/>
      <ellipse cx="40" cy="18" rx="16" ry="12" fill="#e8f4fc"/>
      <ellipse cx="22" cy="24" rx="14" ry="10" fill="#e8f4fc"/>
      <ellipse cx="58" cy="22" rx="12" ry="10" fill="#e8f4fc"/>
    </symbol>

    <!-- Leaf -->
    <symbol id="leaf" viewBox="0 0 40 50">
      <path d="M20 5 C10 15, 5 30, 20 45 C35 30, 30 15, 20 5Z"
            fill="#b8e6d0" stroke="#7cc4a5" stroke-width="1"/>
      <path d="M20 12 L20 40" stroke="#7cc4a5" stroke-width="1" fill="none"/>
      <path d="M15 20 L20 24" stroke="#7cc4a5" stroke-width="0.8" fill="none"/>
      <path d="M25 26 L20 30" stroke="#7cc4a5" stroke-width="0.8" fill="none"/>
    </symbol>
  </defs>
</svg>

<h2>🌸 SVG Stickers & Emoji Component</h2>

<div class="demo-label">SVG Symbol Stickers (hover to enlarge)</div>
<div class="demo-row">
  <svg class="sticker" width="55" height="55" viewBox="0 0 60 60" style="transform:rotate(-5deg);"><use href="#flower-1"/></svg>
  <svg class="sticker" width="45" height="45" viewBox="0 0 50 50" style="transform:rotate(10deg);"><use href="#flower-2"/></svg>
  <svg class="sticker" width="40" height="40" viewBox="0 0 40 40" style="transform:rotate(5deg);"><use href="#star"/></svg>
  <svg class="sticker" width="40" height="40" viewBox="0 0 40 40" style="transform:rotate(-8deg);"><use href="#heart"/></svg>
  <svg class="sticker" width="60" height="40" viewBox="0 0 80 50"><use href="#cloud"/></svg>
  <svg class="sticker" width="32" height="40" viewBox="0 0 40 50" style="transform:rotate(15deg);"><use href="#leaf"/></svg>
</div>

<div class="demo-label">Emoji Stickers (click for particle burst)</div>
<div class="demo-row">
  <span class="emoji-sticker">🌸</span>
  <span class="emoji-sticker">🦋</span>
  <span class="emoji-sticker">✨</span>
  <span class="emoji-sticker">🌻</span>
  <span class="emoji-sticker">🎀</span>
  <span class="emoji-sticker">☕</span>
  <span class="emoji-sticker">🍰</span>
  <span class="emoji-sticker">📖</span>
  <span class="emoji-sticker">💕</span>
  <span class="emoji-sticker">🌈</span>
</div>

<script>
  // Emoji particle burst on click
  document.querySelectorAll('.emoji-sticker, .sticker').forEach(el => {
    el.addEventListener('click', (e) => {
      const emojis = ['✨','🌸','💕','⭐','🎀','🌷','💫','🦋'];
      for (let i = 0; i < 5; i++) {
        const p = document.createElement('span');
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.cssText = `
          position:fixed; left:${e.clientX}px; top:${e.clientY}px;
          font-size:${16+Math.random()*14}px; pointer-events:none; z-index:10000;
          transition: all 0.8s cubic-bezier(0.25,0.46,0.45,0.94);
        `;
        document.body.appendChild(p);
        requestAnimationFrame(() => {
          p.style.transform = `translate(${(Math.random()-0.5)*120}px, ${-60-Math.random()*80}px) rotate(${Math.random()*360}deg)`;
          p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 900);
      }
    });
  });
</script>

</body>
</html>
