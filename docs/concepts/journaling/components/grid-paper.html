<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component: Grid Paper</title>
<style>
  /*
   * GRID PAPER COMPONENT
   * --------------------
   * Graph/engineering paper with a subtle grid pattern.
   * Useful for trackers, charts, planning sections.
   *
   * Usage:
   *   <div class="paper-note paper-grid">Your content here</div>
   *
   * Variants:
   *   .paper-grid        — standard 20px grid
   *   .paper-grid-fine   — fine 10px grid
   *   .paper-grid-dot    — dot grid (bullet journal style)
   *
   * CSS Custom Properties:
   *   --grid-size: 20px
   *   --grid-color: rgba(180,170,155,0.2)
   */

  :root {
    --cream: #faf5eb;
    --paper-bg: #fefcf7;
    --grid-size: 20px;
    --grid-color: rgba(180,170,155,0.2);
    --shadow-warm: rgba(90, 62, 40, 0.12);
    --shadow-deep: rgba(90, 62, 40, 0.22);
  }

  body { background: var(--cream); padding: 40px; font-family: system-ui, sans-serif; }
  .demo-label { font-size: 13px; color: #888; margin-bottom: 8px; font-family: monospace; }
  .demo-row { margin-bottom: 30px; }

  .paper-note {
    position: relative;
    background: var(--paper-bg);
    padding: 28px 24px;
    box-shadow: 2px 3px 8px var(--shadow-warm), 0 1px 2px var(--shadow-deep);
    border-radius: 2px;
  }

  /* ===== STANDARD GRID ===== */
  .paper-grid {
    background-color: var(--paper-bg);
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: var(--grid-size) var(--grid-size);
  }

  /* ===== FINE GRID ===== */
  .paper-grid-fine {
    background-color: var(--paper-bg);
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 10px 10px;
  }

  /* ===== DOT GRID (Bullet Journal) ===== */
  .paper-grid-dot {
    background-color: var(--paper-bg);
    background-image: radial-gradient(
      circle 1px,
      rgba(160,150,135,0.35) 1px,
      transparent 1px
    );
    background-size: var(--grid-size) var(--grid-size);
    background-position: 10px 10px;
  }
</style>
</head>
<body>

<h2>📐 Grid Paper Component</h2>

<div class="demo-row">
  <div class="demo-label">.paper-note.paper-grid (standard 20px)</div>
  <div class="paper-note paper-grid" style="max-width:400px; min-height:160px;"></div>
</div>

<div class="demo-row">
  <div class="demo-label">.paper-note.paper-grid-fine (fine 10px)</div>
  <div class="paper-note paper-grid-fine" style="max-width:400px; min-height:160px;"></div>
</div>

<div class="demo-row">
  <div class="demo-label">.paper-note.paper-grid-dot (bullet journal dot grid)</div>
  <div class="paper-note paper-grid-dot" style="max-width:400px; min-height:160px;"></div>
</div>

</body>
</html>
