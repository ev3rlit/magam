<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Component: Kraft Paper Texture</title>
<style>
  /*
   * KRAFT PAPER TEXTURE COMPONENT
   * -----------------------------
   * Warm brown recycled paper with a fibrous noise texture.
   * Great for rustic, organic, eco-friendly aesthetics.
   *
   * Usage:
   *   <div class="paper-note paper-kraft">Your content</div>
   *
   * Texture is achieved via:
   *   1. Base color gradient (kraft-light)
   *   2. SVG feTurbulence noise overlay (pseudo-element)
   *   3. Subtle grain pattern
   *
   * CSS Custom Properties:
   *   --kraft: #c9a96e
   *   --kraft-light: #e8d5a8
   *   --kraft-dark: #a8884e
   */

  :root {
    --cream: #faf5eb;
    --kraft: #c9a96e;
    --kraft-light: #e8d5a8;
    --kraft-dark: #a8884e;
    --brown-ink: #5a3e28;
    --shadow-warm: rgba(90, 62, 40, 0.12);
    --shadow-deep: rgba(90, 62, 40, 0.22);
  }

  body { background: var(--cream); padding: 40px; font-family: system-ui, sans-serif; }
  .demo-label { font-size: 13px; color: #888; margin-bottom: 8px; font-family: monospace; }
  .demo-row { margin-bottom: 30px; }

  .paper-note {
    position: relative;
    padding: 28px 24px;
    box-shadow: 2px 3px 8px var(--shadow-warm), 0 1px 2px var(--shadow-deep);
    border-radius: 2px;
  }

  /* ===== KRAFT PAPER ===== */
  .paper-kraft {
    background: linear-gradient(
      145deg,
      var(--kraft-light) 0%,
      #dcc590 40%,
      var(--kraft-light) 70%,
      #d8c088 100%
    );
    color: var(--brown-ink);
  }

  /* Fiber/grain noise overlay */
  .paper-kraft::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0.5;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.3'/%3E%3C/svg%3E");
    mix-blend-mode: multiply;
    pointer-events: none;
  }

  /* Subtle speckle pattern */
  .paper-kraft::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background-image: radial-gradient(circle 0.5px, rgba(90,62,40,0.08) 1px, transparent 1px);
    background-size: 6px 6px;
    pointer-events: none;
  }

  /* ===== DARK KRAFT VARIANT ===== */
  .paper-kraft-dark {
    background: linear-gradient(
      145deg,
      var(--kraft) 0%,
      var(--kraft-dark) 50%,
      var(--kraft) 100%
    );
    color: #f5eedd;
  }
  .paper-kraft-dark::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0.4;
    background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.3'/%3E%3C/svg%3E");
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  .handwriting {
    font-family: 'Caveat', cursive;
    font-size: 20px;
    line-height: 1.7;
    position: relative;
    z-index: 1;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<h2>📦 Kraft Paper Texture Component</h2>

<div class="demo-row">
  <div class="demo-label">.paper-note.paper-kraft (light)</div>
  <div class="paper-note paper-kraft" style="max-width:400px; min-height:150px;">
    <div class="handwriting">
      🙏 Things I'm grateful for today:<br>
      A warm cup of coffee ☕<br>
      Sunshine through the window ☀️<br>
      Making progress on my goals 🎯
    </div>
  </div>
</div>

<div class="demo-row">
  <div class="demo-label">.paper-note.paper-kraft-dark</div>
  <div class="paper-note paper-kraft paper-kraft-dark" style="max-width:400px; min-height:150px;">
    <div class="handwriting" style="color:#f5eedd;">
      Dark kraft for vintage labels,<br>
      tags, and rustic envelopes ✉️
    </div>
  </div>
</div>

</body>
</html>
